# Immutable GitLab CI integration for patchlog.
#
# Required project variables:
#   PATCHLOG_VERSION       Exact released tag, for example v1.4.2 (never latest)
#   PATCHLOG_RELEASE_BASE  Release root, for example
#                          https://github.com/fxdv/patchlog/releases
#
# Optional protected/masked variables:
#   GIT_PROVIDER_TOKEN, AI_API_KEY, JIRA_API_TOKEN

stages: [lint, release, audit]

variables:
  PATCHLOG_CONFIG: patchlog.yaml

.patchlog:base:
  image: alpine:3.20
  before_script:
    - apk add --no-cache ca-certificates curl git tar
    - test -n "$PATCHLOG_VERSION"
    - test -n "$PATCHLOG_RELEASE_BASE"
    - echo "$PATCHLOG_VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$'
    - export PATCHLOG_ARCHIVE="patchlog_${PATCHLOG_VERSION}_linux_amd64.tar.gz"
    - curl --fail --silent --show-error --location --output "$PATCHLOG_ARCHIVE" "$PATCHLOG_RELEASE_BASE/download/$PATCHLOG_VERSION/$PATCHLOG_ARCHIVE"
    - curl --fail --silent --show-error --location --output SHA256SUMS "$PATCHLOG_RELEASE_BASE/download/$PATCHLOG_VERSION/SHA256SUMS"
    - grep "  $PATCHLOG_ARCHIVE$" SHA256SUMS | sha256sum --check --strict
    - mkdir .patchlog-bin
    - tar -C .patchlog-bin -xzf "$PATCHLOG_ARCHIVE"
    - install ".patchlog-bin/patchlog_${PATCHLOG_VERSION}_linux_amd64/patchlog" /usr/local/bin/patchlog
    - test "$(patchlog --version)" = "patchlog $PATCHLOG_VERSION"

patchlog:lint:
  extends: .patchlog:base
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - patchlog lint --from "$CI_MERGE_REQUEST_TARGET_BRANCH_SHA" --to HEAD

patchlog:preview:
  extends: .patchlog:base
  stage: lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - patchlog --from "$CI_MERGE_REQUEST_TARGET_BRANCH_SHA" --to HEAD --format markdown --dry-run > release-preview.md
  artifacts:
    paths: [release-preview.md]
    expire_in: 7 days

# A tag pipeline consumes the immutable tag. It never bumps files or creates a
# second tag; release notes are derived from the already-created Git ref.
patchlog:release:
  extends: .patchlog:base
  stage: release
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - export PREVIOUS_TAG="$(git describe --tags --abbrev=0 "$CI_COMMIT_TAG^" 2>/dev/null || true)"
    - patchlog release --from "$PREVIOUS_TAG" --to "$CI_COMMIT_TAG" --format markdown --publish --out release-notes.md
  artifacts:
    paths: [release-notes.md]
    expire_in: 30 days

patchlog:audit:
  extends: .patchlog:base
  stage: audit
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes: [CHANGELOG.md, "src/**/*"]
  script:
    - patchlog audit --from "$CI_COMMIT_BEFORE_SHA" --to HEAD
