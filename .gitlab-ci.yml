image: golang:1.22

stages: [test]

quality:
  stage: test
  before_script:
    - command -v go
    - command -v git
    - go version
  script:
    - bash scripts/gate.sh
    - go test ./pkg/... -covermode=atomic -coverprofile=coverage.out
    - go tool cover -func=coverage.out > coverage-summary.txt
    - bash -n scripts/*.sh
  artifacts:
    when: always
    paths:
      - coverage.out
      - coverage-summary.txt
    expire_in: 14 days
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
