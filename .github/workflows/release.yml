name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - name: Run required quality gate
        run: bash scripts/gate.sh
      - name: Build immutable release artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}"
            arch="${target#*/}"
            suffix=""
            if [ "$os" = windows ]; then suffix=".exe"; fi
            name="patchlog_${VERSION}_${os}_${arch}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build \
              -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
              -o "dist/${name}/patchlog${suffix}" ./cmd/patchlog
            cp LICENSE SECURITY.md "dist/${name}/"
            tar -C dist -czf "dist/${name}.tar.gz" "$name"
            rm -rf "dist/${name}"
          done
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
      - name: Verify installation artifact and checksums
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cd dist
          sha256sum --check SHA256SUMS
          mkdir verify
          tar -C verify -xzf "patchlog_${VERSION}_linux_amd64.tar.gz"
          "verify/patchlog_${VERSION}_linux_amd64/patchlog" --version | grep -F "patchlog ${VERSION}"
      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --verify-tag --generate-notes
