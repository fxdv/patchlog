name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing published immutable release tag to verify
        required: true
        type: string
      verify_module_installs:
        description: Verify @version and @latest (only when this tag is current)
        required: true
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      tag_commit: ${{ steps.release.outputs.tag_commit }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - name: Verify immutable release tag
        id: release
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          PUSH_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
              echo "release recovery must be dispatched from main" >&2
              exit 1
            fi
            release_tag="${DISPATCH_TAG}"
          else
            release_tag="${PUSH_TAG}"
          fi

          if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release workflow accepts only stable vMAJOR.MINOR.PATCH tags: ${release_tag}" >&2
            exit 1
          fi

          git fetch --force origin "refs/tags/${release_tag}:refs/tags/${release_tag}"
          if [ "$(git cat-file -t "${release_tag}")" != "tag" ]; then
            echo "release tag ${release_tag} must be annotated" >&2
            exit 1
          fi

          release_version="$(cat VERSION)"
          expected_tag="v${release_version}"
          if [ -z "${release_version}" ] || [ "${release_tag}" != "${expected_tag}" ]; then
            echo "release tag ${release_tag} does not match VERSION (${expected_tag})" >&2
            exit 1
          fi

          tag_commit="$(git rev-parse "${release_tag}^{commit}")"
          head_commit="$(git rev-parse HEAD)"
          if [ "${tag_commit}" != "${head_commit}" ]; then
            echo "remote release tag ${release_tag} targets ${tag_commit}, checkout is ${head_commit}" >&2
            exit 1
          fi

          echo "tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "tag_commit=${tag_commit}" >> "${GITHUB_OUTPUT}"
      - name: Require an existing published release for recovery
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          test "$(gh release view "${RELEASE_TAG}" --json isDraft --jq .isDraft)" = "false"
      - if: github.event_name == 'push'
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'
          cache: true
      - name: Run required quality gate
        if: github.event_name == 'push'
        run: bash scripts/gate.sh
      - name: Build immutable release artifacts
        if: github.event_name == 'push'
        env:
          VERSION: ${{ steps.release.outputs.tag }}
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}"
            arch="${target#*/}"
            suffix=""
            if [ "$os" = windows ]; then suffix=".exe"; fi
            name="patchlog_${VERSION}_${os}_${arch}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build \
              -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
              -o "dist/${name}/patchlog${suffix}" ./cmd/patchlog
            cp LICENSE SECURITY.md "dist/${name}/"
            tar -C dist -czf "dist/${name}.tar.gz" "$name"
            rm -rf "dist/${name}"
          done
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
      - name: Render package-manager manifests
        if: github.event_name == 'push'
        env:
          VERSION: ${{ steps.release.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          bash scripts/render-package-manifests.sh
          (
            cd dist
            sha256sum patchlog.rb patchlog.json >> SHA256SUMS
          )
      - name: Verify installation artifact and checksums
        if: github.event_name == 'push'
        env:
          VERSION: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          (
            cd dist
            sha256sum --check SHA256SUMS
          )
          verify_dir="$(mktemp -d)"
          trap 'rm -rf "${verify_dir}"' EXIT
          tar -C "${verify_dir}" -xzf "dist/patchlog_${VERSION}_linux_amd64.tar.gz"
          "${verify_dir}/patchlog_${VERSION}_linux_amd64/patchlog" --version | grep -F "patchlog ${VERSION}"
      - name: Sign build provenance attestations
        if: github.event_name == 'push'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: 'dist/*.tar.gz'
      - name: Publish GitHub release assets
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          assets=(
            "dist/patchlog_${RELEASE_TAG}_linux_amd64.tar.gz"
            "dist/patchlog_${RELEASE_TAG}_linux_arm64.tar.gz"
            "dist/patchlog_${RELEASE_TAG}_darwin_amd64.tar.gz"
            "dist/patchlog_${RELEASE_TAG}_darwin_arm64.tar.gz"
            "dist/patchlog_${RELEASE_TAG}_windows_amd64.tar.gz"
            "dist/SHA256SUMS"
            "dist/patchlog.rb"
            "dist/patchlog.json"
          )
          for asset in "${assets[@]}"; do
            if [ ! -f "${asset}" ]; then
              echo "missing release asset: ${asset}" >&2
              exit 1
            fi
          done
          gh release create "${RELEASE_TAG}" "${assets[@]}" --verify-tag --generate-notes

  verify-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'
          cache: false
      - name: Verify the published release trust loop
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_DIGEST: ${{ needs.release.outputs.tag_commit }}
          VERIFY_SOURCE_IDENTITY: ${{ github.event_name == 'push' }}
          VERIFY_MODULE_INSTALLS: ${{ github.event_name == 'push' || inputs.verify_module_installs }}
        run: bash scripts/verify-release.sh
