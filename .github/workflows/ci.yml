name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
      - name: Verify required tools
        run: |
          command -v go
          command -v git
          go version
      - name: Run required quality gate
        run: bash scripts/gate.sh
      - name: Generate Go coverage artifact
        run: |
          go test ./pkg/... -covermode=atomic -coverprofile=coverage.out
          go tool cover -func=coverage.out > coverage-summary.txt
      - name: Upload Go coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: |
            coverage.out
            coverage-summary.txt
          if-no-files-found: error
      - name: Verify shell syntax
        run: bash -n scripts/*.sh
